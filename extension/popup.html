<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LeetCoach</title>
    <style>
      :root {
        --bg: #0b1220;
        --fg: #e8eef7;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }
      body {
        margin: 0;
        width: 280px;
        font-family: "Segoe UI", ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(160deg, #0b1220, #132033);
        color: var(--fg);
        padding: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }
      label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        background: #0f172a;
        color: var(--fg);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 6px;
        padding: 9px 12px;
        background: var(--accent);
        color: #0b1220;
        font-weight: 600;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        font-size: 11px;
        color: var(--muted);
      }
      a {
        color: var(--accent);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>LeetCoach 助手</h1>
    <p>Records LeetCode submits → spaced review & progressive hints.</p>
    <label for="api">Backend URL</label>
    <input id="api" type="text" placeholder="http://localhost:8000" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <p style="margin-top: 12px">
      <a href="http://localhost:3000" target="_blank" rel="noreferrer">Open dashboard</a>
    </p>
    <script src="popup.js"></script>
  </body>
</html>
